<!DOCTYPE html>
<html>

<body>

<div class="container" style="max-width: 500px; margin:auto; margin-top: 50px;">

        <h2>Create Babysitter Profile</h2>

        <label>Full Name</label>
        <input type="text">

        <br><br>

        <a href="babysitter-dashboard.html">
            <button class="green-btn" style="width:100%;">Create Account</button>
        </a>
    </div>
